services:
  # Backend Web Service
  - type: web
    name: teammate-backend
    env: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: teammate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: static
    name: teammate-frontend
    env: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: teammate-backend
          property: host
        value: ${teammate-backend.host}/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: teammate-db
    plan: free
    postgresRole: teammate_user
