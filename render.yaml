services:
  # Backend Web Service
  - type: web
    name: teammate-backend
    env: node
    plan: free
    baseDir: server
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: teammate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: teammate-frontend
    env: static
    baseDir: client
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://${teammate-backend.host}/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: teammate-db
    plan: free
    user: teammate_user
